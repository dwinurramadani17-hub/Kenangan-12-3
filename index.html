<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kenangan Kelas 12</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: #f9f9f9;
      color: #333;
    }
    header {
      height: 60vh;
      background: url('XII-3.jpg') center/cover no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.7);
    }
    header h1 {
      font-size: 2rem;
      text-align: center;
      padding: 0 10px;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      padding: 15px;
    }
    .gallery img {
      width: 100%;
      border-radius: 8px;
      transition: transform 0.3s ease;
    }
    .gallery img:hover {
      transform: scale(1.05);
    }
    .students {
      padding: 20px;
      background: #f0f0f0;
    }
    .students h2 {
      text-align: center;
      margin-bottom: 15px;
      font-size: 1.3rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 15px;
    }
    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;
    }
    .card img {
      width: 100%;
      height: auto;
      max-height: 160px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .card h3 {
      font-size: 0.8rem;
    }
    .card.teacher {
      background: #ffe082;
      font-weight: bold;
      border: 2px solid #fbc02d;
    }
    footer {
      text-align: center;
      padding: 15px;
      background: #222;
      color: #fff;
      font-size: 0.9rem;
    }
    /* Tambahan untuk layar kecil */
    @media (max-width: 600px) {
      header {
        height: 40vh;
      }
      header h1 {
        font-size: 1.5rem;
      }
      .card h3 {
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <!-- Hero -->
  <header>
    <h1>Kenangan Kelas 12</h1>
  </header>

  <!-- Galeri Foto -->
  <section class="gallery">
    <img src="sub1.jpg" alt="Kenangan 1">
    <img src="sub2.jpg" alt="Kenangan 2">
    <img src="sub3.jpg" alt="Kenangan 3">
  </section>

  <!-- Daftar Siswa -->
  <section class="students">
    <h2>Daftar Siswa Kelas 12</h2>
    <div class="grid">
      <div class="card"><img src="aden.jpg"><h3>1. ADEN SYAHIR PERI KABEKTI</h3></div>
      <div class="card"><img src="aisyah.jpg"><h3>2. AISYAH</h3></div>
      <div class="card"><img src="amanah.jpg"><h3>3. AMANAH SEPTI RAMADHANI</h3></div>
      <div class="card"><img src="amanah.jpg"><h3>4. AMANAH SEPTI RAMADHANI</h3></div>
      <div class="card"><img src="amanah.jpg"><h3>5. AMANAH SEPTI RAMADHANI</h3></div>
      <!-- lanjutkan semua siswa sampai 33 -->
      <div class="card"><img src="zidan.jpg"><h3>33. ZIDAN RAYHANDA</h3></div>
    </div>
  </section>

  <!-- Wali Kelas -->
  <section class="students">
    <h2>Wali Kelas Kami</h2>
    <div class="grid">
      <div class="card teacher">
        <img src="walikelas.jpg" alt="Maliani, S.Pd Ekop">
        <h3>MALIANI, S.Pd Ekop</h3>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>Terima kasih atas kebersamaan ini 💙</p>
  </footer>
</body>
</html>
